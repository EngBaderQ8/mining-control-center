appId: com.bader.miningcontrolcenter
productName: Mining Control Center
directories:
  output: release
  buildResources: build
files:
  - dist/**
  - package.json
  - "!**/*.map"
win:
  target:
    - nsis
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  artifactName: "MiningControlCenter-Setup-${version}.${ext}"
