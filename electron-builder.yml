appId: com.bader.miningcontrolcenter
productName: Mining Control Center
directories:
  output: release
  buildResources: build
# Auto-update source: the public releases repo.
publish:
  provider: github
  owner: EngBaderQ8
  repo: mining-releases
files:
  - dist/**
  - package.json
  - "!**/*.map"
win:
  target:
    - nsis
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  artifactName: "MiningControlCenter-Setup-${version}.${ext}"
